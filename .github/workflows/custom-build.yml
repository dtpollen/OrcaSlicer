# Pollen: build à la demande, uniquement Windows x64 + macOS (Intel, Apple Silicon, universel).
# Nommé "custom-build.yml" (et non "build_*.yml") pour ne pas déclencher "Build all" via ses filtres de chemins.
name: Custom build (Windows + macOS)

on:
  workflow_dispatch:
    inputs:
      build-deps-only:
        description: 'Only build dependencies (bypasses caching)'
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build_windows:
    name: Build Windows x64
    uses: ./.github/workflows/build_check_cache.yml
    with:
      os: windows-latest
      arch: x64
      build-deps-only: ${{ inputs.build-deps-only || false }}
    secrets: inherit

  build_macos_arch:
    name: Build macOS ${{ matrix.arch }}
    strategy:
      fail-fast: false
      matrix:
        arch:
          - arm64   # toutes les puces Apple Silicon (M1 à M5)
          - x86_64  # Mac Intel
    uses: ./.github/workflows/build_check_cache.yml
    with:
      os: macos-14
      arch: ${{ matrix.arch }}
      build-deps-only: ${{ inputs.build-deps-only || false }}
    secrets: inherit

  build_macos_universal:
    name: Build macOS Universal
    needs: build_macos_arch
    if: ${{ !cancelled() && needs.build_macos_arch.result == 'success' && !inputs.build-deps-only }}
    uses: ./.github/workflows/build_orca.yml
    with:
      os: macos-14
      arch: universal
      macos-combine-only: true
    secrets: inherit
